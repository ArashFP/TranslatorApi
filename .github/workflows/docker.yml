name: Translator API CI/CD

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  # --------------------------
  # 1️⃣ CI: Bygg och testa Docker-image
  # --------------------------
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t translatorapi:latest .

      - name: Run container and test API
        run: |
          docker run -d -p 8080:5070 --name translator-test translatorapi:latest
          sleep 20
          curl -f http://localhost:8080/swagger
          docker stop translator-test
          docker rm translator-test

  # --------------------------
  # 2️⃣ CD: Push Docker image till Docker Hub (bara på main)
  # --------------------------
  docker_push:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: memorizedhooks/translatorapi:latest

  # --------------------------
  # 3️⃣ CD: Deploy till AWS Elastic Beanstalk
  # --------------------------
  aws_deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip source for deployment
        run: zip -r deploy.zip . -x '.git/*'

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: TranslatorApi
          environment_name: TranslatorApi-env
          version_label: ${{ github.sha }}
          region: eu-north-1
          wait_for_environment_recovery: 60
          deployment_package: deploy.zip